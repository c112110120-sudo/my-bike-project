<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBike | 高科幣校園租賃系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #f4f7f6; color: #334155; font-family: 'Noto Sans TC', sans-serif; }
        .glass { background: #ffffff; border-radius: 16px; border: 1px solid #e2e8f0; padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .page-title { background: linear-gradient(135deg, #0d9488, #0284c7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .price-title { color: #64748b; font-size: 0.85rem; margin-bottom: 5px; font-weight: 500; text-transform: uppercase; }
        .price-val { color: #0ea5e9; font-size: 1.6rem; font-weight: 700; }
        .btn-city.active { background: linear-gradient(135deg, #14b8a6, #0ea5e9); color: white; border: none; }
        .rent-box { border: 2px solid #0ea5e9; background: rgba(14, 165, 233, 0.02); }
        .status-box { border: 1px solid #f59e0b; background: rgba(245,158,11,0.05); display: none; }
        .btn-main { background: linear-gradient(135deg, #10b981, #14b8a6); color: white; border: none; font-weight: 600; border-radius: 50px; padding: 15px; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="page-title mb-2">🚲 SmartBike Dashboard</h1>
        <div id="walletStatus" class="badge bg-light text-muted border rounded-pill px-3 py-2">錢包未連線</div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="glass text-center">
                <h5 class="price-title mb-3">📍 環境監測</h5>
                <div class="btn-group mb-3 w-100 shadow-sm rounded-pill overflow-hidden">
                    <button class="btn btn-outline-secondary btn-sm btn-city" id="btn-Taipei" onclick="updateWeather('Taipei')">台北</button>
                    <button class="btn btn-outline-secondary btn-sm btn-city active" id="btn-Kaohsiung" onclick="updateWeather('Kaohsiung')">高雄</button>
                </div>
                <h4 id="cityName" class="fw-bold text-dark">高雄市</h4>
                <h2 class="fw-bold my-2" id="temp" style="font-size: 2.2rem;">--°C</h2>
                <p id="weatherDesc" class="text-muted small">同步中...</p>
            </div>

            <div class="glass text-center">
                <h5 class="price-title mb-3">💰 市場匯率 (ETH/USD)</h5>
                <div class="price-val" id="ethUsdDisplay">$ --</div>
            </div>

            <div class="glass border-info">
                <h5 class="price-title text-center mb-3">💳 我的校園資產</h5>
                <div class="text-center mb-3">
                    <div class="price-val" id="nkustBalanceDisplay">0.00 NKUST</div>
                    <button class="btn btn-link btn-sm text-decoration-none" onclick="addNKUSTtoWallet()">+ 加入錢包</button>
                </div>
                <hr>
                <h6 class="price-title mb-2 text-center">🛒 兌換高科幣</h6>
                <div class="input-group input-group-sm mb-2">
                    <input type="number" id="buyAmount" class="form-control" placeholder="ETH 數量" step="0.01">
                    <span class="input-group-text">ETH</span>
                </div>
                <button class="btn btn-success btn-sm w-100 rounded-pill fw-bold" onclick="handleBuyTokens()">立即兌換</button>
            </div>
        </div>

        <div class="col-md-8">
            <div class="glass rent-box h-100">
                <h4 class="fw-bold mb-4">🚲 校園單車租賃系統</h4>
                
                <div id="statusBox" class="glass status-box mb-4">
                    <h6 class="text-warning fw-bold mb-2">📋 租借狀態：租借中</h6>
                    <div class="small">起租時間：<span id="statusTime">--</span></div>
                    <div class="small">鎖定押金：10.00 NKUST</div>
                </div>

                <div class="d-grid gap-3">
                    <button id="approveBtn" class="btn btn-outline-info btn-lg rounded-pill fw-bold" onclick="handleApprove()">1. 授權合約使用 NKUST</button>
                    <button id="rentBtn" class="btn btn-main btn-lg shadow" onclick="handleRent()" disabled>2. 支付押金並取車</button>
                    <button id="returnBtn" class="btn btn-outline-warning btn-lg rounded-pill fw-bold" onclick="handleReturn()">歸還單車並結算</button>
                </div>

                <div class="mt-4 pt-4 border-top">
                    <h6 class="price-title mb-2">📄 智能合約地址</h6>
                    <div class="p-2 bg-light rounded border x-small" style="font-size: 0.7rem;">
                        <div>NKUST: <code>0x6b3f588981532574d636b7146449AD8B0741782B</code></div>
                        <div class="mt-1">Rental: <code>0x91242fD93af744401F8e2C7bAE51Af00a57d79Af</code></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const nkustAddress = "0x6b3f588981532574d636b7146449AD8B0741782B";
    const bikeAddress = "0x91242fD93af744401F8e2C7bAE51Af00a57d79Af";
    const abi = ["function balanceOf(address) view returns (uint256)", "function approve(address, uint256) returns (bool)", "function allowance(address, address) view returns (uint256)", "function buyToken() public payable", "function rentBike() public", "function returnBike() public", "function rentals(address) public view returns (uint256, uint256, bool)"];

    async function init() {
        if (!window.ethereum) return;
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const accounts = await provider.listAccounts();
        if (accounts.length > 0) {
            document.getElementById('walletStatus').innerText = "已連線: " + accounts[0].substring(0, 8);
            const token = new ethers.Contract(nkustAddress, abi, provider);
            const bal = await token.balanceOf(accounts[0]);
            document.getElementById('nkustBalanceDisplay').innerText = parseFloat(ethers.utils.formatUnits(bal, 18)).toFixed(2) + " NKUST";
            
            const allow = await token.allowance(accounts[0], bikeAddress);
            if (allow.gt(ethers.utils.parseUnits("9", 18))) {
                document.getElementById('rentBtn').disabled = false;
                document.getElementById('approveBtn').innerText = "✓ 授權已完成";
                document.getElementById('approveBtn').disabled = true;
            }

            const bike = new ethers.Contract(bikeAddress, abi, provider);
            const info = await bike.rentals(accounts[0]);
            if (info[2]) {
                document.getElementById('statusBox').style.display = 'block';
                document.getElementById('statusTime').innerText = new Date(info[0].toNumber()*1000).toLocaleString();
                document.getElementById('rentBtn').disabled = true;
            } else { document.getElementById('statusBox').style.display = 'none'; }
        }
        updatePrice();
    }

    async function updateWeather(city) {
        document.getElementById('btn-Taipei').classList.toggle('active', city === 'Taipei');
        document.getElementById('btn-Kaohsiung').classList.toggle('active', city === 'Kaohsiung');
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=db68851cff88bbfaf24ddcefbccb2a18&units=metric&lang=zh_tw`);
        const data = await res.json();
        document.getElementById('cityName').innerText = data.name === "Taipei" ? "台北市" : "高雄市";
        document.getElementById('temp').innerText = Math.round(data.main.temp) + "°C";
        document.getElementById('weatherDesc').innerText = data.weather[0].description;
    }

    async function updatePrice() {
        const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd");
        const data = await res.json();
        document.getElementById('ethUsdDisplay').innerText = "$ " + data.ethereum.usd.toLocaleString();
    }

    async function handleBuyTokens() {
        const ethVal = document.getElementById('buyAmount').value;
        const signer = new ethers.providers.Web3Provider(window.ethereum).getSigner();
        const token = new ethers.Contract(nkustAddress, abi, signer);
        const tx = await token.buyToken({ value: ethers.utils.parseEther(ethVal) });
        await tx.wait(); init();
    }

    async function handleApprove() {
        const signer = new ethers.providers.Web3Provider(window.ethereum).getSigner();
        const token = new ethers.Contract(nkustAddress, abi, signer);
        const tx = await token.approve(bikeAddress, ethers.utils.parseUnits("1000", 18));
        await tx.wait(); init();
    }

    async function handleRent() {
        const signer = new ethers.providers.Web3Provider(window.ethereum).getSigner();
        const bike = new ethers.Contract(bikeAddress, abi, signer);
        const tx = await bike.rentBike();
        await tx.wait(); init();
    }

    async function handleReturn() {
        const signer = new ethers.providers.Web3Provider(window.ethereum).getSigner();
        const bike = new ethers.Contract(bikeAddress, abi, signer);
        const tx = await bike.returnBike();
        await tx.wait(); init();
    }

    async function addNKUSTtoWallet() {
        await window.ethereum.request({ method: 'wallet_watchAsset', params: { type: 'ERC20', options: { address: nkustAddress, symbol: 'NKUST', decimals: 18 }}});
    }

    window.onload = () => { init(); updateWeather('Kaohsiung'); };
</script>
</body>
</html>
