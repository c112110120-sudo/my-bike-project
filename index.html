<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartBike 校園租賃系統</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<style>

body{
background:#f8fafc;
font-family:'Noto Sans TC';
}

.glass{
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 10px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.btn-main{
background:linear-gradient(135deg,#0d9488,#0284c7);
color:white;
border:none;
}

</style>
</head>

<body>

<div class="container py-5">

<h2 class="text-center mb-5 fw-bold">🚲 SmartBike 租賃系統</h2>


<div class="row">

<!-- 左側 -->
<div class="col-md-4">

<div class="glass text-center">

<h5>💳 我的錢包資產</h5>

<h3 id="nkustBalanceDisplay">0 NKUST</h3>

<div class="input-group mt-3">

<input type="number" id="buyAmount" class="form-control" placeholder="輸入購買數量">

<button class="btn btn-success" onclick="handleBuyTokens()">購買</button>

</div>

<div id="ethQuote" class="small text-muted mt-2"></div>

</div>

<div class="glass">

<h6>📍 天氣</h6>

<div>

<span id="cityName">高雄市</span>

<span id="cityTemp">--°C</span>

</div>

</div>

</div>

<!-- 右側 -->
<div class="col-md-8">

<div class="glass">

<h4 class="fw-bold mb-4">🚲 租車控制</h4>

<button id="approveBtn" class="btn btn-outline-primary w-100 mb-3"
onclick="handleApprove()">

授權合約

</button>

<button id="rentBtn"
class="btn btn-secondary w-100 mb-3"
disabled
onclick="handleRent()">

租車

</button>

<button id="returnBtn"
class="btn btn-danger w-100"
onclick="handleReturn()">

歸還單車

</button>

</div>

<div class="glass">

<h6>目前狀態</h6>

<div id="statusBox" style="display:none">

<span class="text-success">使用中</span>

<div id="statusTime"></div>

</div>

<div id="emptyStatus">

目前沒有租借

</div>

</div>

</div>

</div>

<hr class="mt-5">

<h4 class="fw-bold text-danger">📊 管理員後台</h4>

<table class="table">

<thead>

<tr>
<th>地址</th>
<th>狀態</th>
<th>租借時間</th>
</tr>

</thead>

<tbody id="adminTableBody"></tbody>

</table>

</div>

<script>

// ===== 設定 =====

const ADMIN_PASSWORD="nkust"

const nkustAddr="0x06830407ECE8DF4F534ab9191112C7286aF50156"

const bikeAddr="0xecE2D3BA604410A9E2464BD5c8363B2D2Fb01eE0"

const abi=[

"function balanceOf(address)view returns(uint256)",
"function allowance(address,address)view returns(uint256)",
"function approve(address,uint256) returns(bool)",

"function buyTokens(uint256) payable",

"function rent()",
"function returnBike()",

"function users(address)view returns(bool isRented,uint256 startTime)",
"function getAllUsers() view returns(address[])"

]

let provider
let signer
let user

let token
let bike

let globalEstimatedEth="0"

// ===== 初始化 =====

async function init(){

if(!window.ethereum){
alert("請安裝 MetaMask")
return
}

provider=new ethers.providers.Web3Provider(window.ethereum)

await provider.send("eth_requestAccounts",[])

signer=provider.getSigner()

user=await signer.getAddress()

token=new ethers.Contract(nkustAddr,abi,signer)

bike=new ethers.Contract(bikeAddr,abi,signer)

updateBalance()

checkAllowance()

checkRentStatus()

fetchEthPrice()

updateWeather("Kaohsiung")

updateAdminTable()

}

// ===== 餘額 =====

async function updateBalance(){

const bal=await token.balanceOf(user)

const clean=Math.floor(parseFloat(ethers.utils.formatUnits(bal,18)))

document.getElementById("nkustBalanceDisplay").innerText=clean+" NKUST"

}

// ===== 授權 =====

async function checkAllowance(){

const allow=await token.allowance(user,bikeAddr)

const need=ethers.utils.parseUnits("20",18)

if(allow.gte(need)){

document.getElementById("approveBtn").disabled=true

document.getElementById("rentBtn").disabled=false

}

}

async function handleApprove(){

const tx=await token.approve(bikeAddr,ethers.utils.parseUnits("1000",18))

await tx.wait()

alert("授權成功")

init()

}

// ===== 租車 =====

async function handleRent(){

const tx=await bike.rent()

await tx.wait()

alert("租車成功")

location.reload()

}

// ===== 歸還 =====

async function handleReturn(){

const tx=await bike.returnBike()

await tx.wait()

alert("已歸還")

location.reload()

}

// ===== 狀態 =====

async function checkRentStatus(){

const info=await bike.users(user)

if(info.isRented){

document.getElementById("statusBox").style.display="block"

document.getElementById("emptyStatus").style.display="none"

document.getElementById("statusTime").innerText=

new Date(info.startTime*1000).toLocaleString()

}

}

// ===== 買幣 =====

async function handleBuyTokens(){

const amount=document.getElementById("buyAmount").value

if(!amount) return alert("請輸入數量")

const ethValue=ethers.utils.parseEther(globalEstimatedEth)

const tx=await token.buyTokens(amount,{value:ethValue})

await tx.wait()

alert("購買成功")

location.reload()

}

// ===== ETH價格 =====

async function fetchEthPrice(){

try{

const res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd")

const data=await res.json()

const price=data.ethereum.usd

const usdToTwd=32.5

globalEstimatedEth=((100/usdToTwd)/price).toFixed(6)

}catch(e){}

}

// ===== 天氣 =====

async function updateWeather(city){

try{

const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=db68851cff88bbfaf24ddcefbccb2a18&units=metric`)

const data=await res.json()

document.getElementById("cityTemp").innerText=Math.round(data.main.temp)+"°C"

}catch(e){}

}

// ===== 後台 =====

async function updateAdminTable(){

const prov=new ethers.providers.Web3Provider(window.ethereum)

const bikeContract=new ethers.Contract(bikeAddr,abi,prov)

const list=await bikeContract.getAllUsers()

const tbody=document.getElementById("adminTableBody")

tbody.innerHTML=""

for(let addr of list){

const info=await bikeContract.users(addr)

const status=info.isRented?"租借中":"已歸還"

const time=info.startTime>0?

new Date(info.startTime*1000).toLocaleString():"-"

tbody.innerHTML+=`

<tr>

<td>${addr}</td>

<td>${status}</td>

<td>${time}</td>

</tr>

`

}

}

// ===== 監聽 =====

if(window.ethereum){

window.ethereum.on("accountsChanged",()=>location.reload())

window.ethereum.on("chainChanged",()=>location.reload())

}

window.addEventListener("load",init)

</script>

</body>
</html>
