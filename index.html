<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBike | 高科幣校園租賃系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #f8fafc; font-family: 'Noto Sans TC', sans-serif; color: #1e293b; }
        .glass { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .btn-main { background: linear-gradient(135deg, #0d9488, #0284c7); color: white; border: none; font-weight: 600; padding: 12px; border-radius: 50px; }
        .btn-main:disabled { background: #cbd5e1; }
        .status-box { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 12px; padding: 15px; display: none; }
    </style>
</head>
<body>

<div class="container py-5">
    <h1 class="text-center fw-bold mb-4" style="color: #0369a1;">🚲 SmartBike 管理後台</h1>
    
    <div class="row">
        <div class="col-md-5">
            <div class="glass">
                <h5 class="fw-bold mb-3">📍 氣象與匯率</h5>
                <div class="d-flex justify-content-between mb-2">
                    <span>當前城市：<b id="cityName">高雄市</b></span>
                    <span id="temp" class="text-primary fw-bold">--°C</span>
                </div>
                <div class="d-flex justify-content-between">
                    <span>ETH 匯率：</span>
                    <b id="ethUsdDisplay" class="text-success">$ ----</b>
                </div>
                <div class="btn-group w-100 mt-3">
                    <button class="btn btn-sm btn-outline-secondary" onclick="updateWeather('Taipei')">台北</button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="updateWeather('Kaohsiung')">高雄</button>
                </div>
            </div>

            <div class="glass border-primary">
                <h5 class="fw-bold mb-3">💳 我的錢包資產</h5>
                <h3 id="nkustBalanceDisplay" class="fw-bold text-center my-3">0.00 NKUST</h3>
                <div class="input-group mb-2">
                    <input type="number" id="buyAmount" class="form-control" placeholder="輸入 ETH 數量">
                    <button class="btn btn-success" onclick="handleBuyTokens()">兌換</button>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="glass h-100">
                <h5 class="fw-bold mb-4 text-secondary">🚲 單車租賃控制台</h5>
                
                <div id="statusBox" class="status-box mb-4">
                    <div class="fw-bold text-warning">● 系統偵測：您目前有一輛租借中的單車</div>
                    <small class="text-muted">起租時間：<span id="statusTime">--</span></small>
                </div>

                <div class="d-grid gap-3">
                    <button id="approveBtn" class="btn btn-outline-primary btn-lg fw-bold" onclick="handleApprove()">第一步：授權 0.1 顆 NKUST</button>
                    <button id="rentBtn" class="btn btn-main btn-lg" onclick="handleRent()" disabled>第二步：支付押金並取車</button>
                    <button class="btn btn-outline-danger mt-4" onclick="handleReturn()">歸還單車並退回押金</button>
                </div>

                <div class="mt-5 pt-3 border-top small text-muted">
                    <div>代幣合約：<code>0x0fb4EEfD9f47D5064A438328D8D2f435D32A4Eb0</code></div>
                    <div>租借合約：<code>0x2513DECcd9030EE3454319dcF96060AFB7eBc067</code></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const nkustAddr = "0x692D9FC10D3D74327A4B879936f265c9208273a4";
    const bikeAddr = "0x4faBff09Dd74F2C86d95C7212D9605bb7122BCED";
    
    // 最保險的 ABI 寫法
    const abi = [
        "function balanceOf(address owner) view returns (uint256)",
        "function approve(address spender, uint256 amount) returns (bool)",
        "function allowance(address owner, address spender) view returns (uint256)",
        "function buyToken() payable",
        "function rentBike()",
        "function returnBike()",
        "function rentals(address) view returns (uint256 startTime, bool isRented)"
    ];

    async function init() {
        if (!window.ethereum) { alert("請安裝 MetaMask"); return; }
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();
        const userAddr = await signer.getAddress();

        // 1. 更新餘額
        const token = new ethers.Contract(nkustAddr, abi, provider);
        const bal = await token.balanceOf(userAddr);
        document.getElementById('nkustBalanceDisplay').innerText = ethers.utils.formatUnits(bal, 18) + " NKUST";

        // 2. 檢查授權 (只要大於等於 10 就視為已授權)
        const allow = await token.allowance(userAddr, bikeAddr);
        if (allow.gte(ethers.utils.parseUnits("10", 18))) {
            document.getElementById('rentBtn').disabled = false;
            document.getElementById('approveBtn').innerText = "✅ 已授權成功";
            document.getElementById('approveBtn').classList.replace('btn-outline-primary', 'btn-light');
        }

        // 3. 檢查租借狀態
        const bike = new ethers.Contract(bikeAddr, abi, provider);
        const info = await bike.rentals(userAddr);
        if (info.isRented) {
            document.getElementById('statusBox').style.display = 'block';
            document.getElementById('statusTime').innerText = new Date(info.startTime.toNumber() * 1000).toLocaleString();
            document.getElementById('rentBtn').disabled = true;
        }

        updatePrice();
    }

    async function handleApprove() {
        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const token = new ethers.Contract(nkustAddr, abi, signer);
            
            // 授權 100 顆，確保夠用
            const tx = await token.approve(bikeAddr, ethers.utils.parseUnits("100", 18));
            alert("授權交易已發送，請等待確認...");
            await tx.wait();
            alert("授權成功！");
            location.reload(); // 重新整理頁面更新狀態
        } catch (e) {
            console.error(e);
            alert("授權失敗：可能是您取消了交易或餘額不足以支付 Gas 費");
        }
    }

    async function handleRent() {
        try {
            const signer = new ethers.providers.Web3Provider(window.ethereum).getSigner();
            const bike = new ethers.Contract(bikeAddr, abi, signer);
            const tx = await bike.rentBike();
            await tx.wait();
            alert("租車成功！祝您校園行愉快");
            location.reload();
        } catch (e) { alert("租車失敗"); }
    }

    async function handleReturn() {
        try {
            const signer = new ethers.providers.Web3Provider(window.ethereum).getSigner();
            const bike = new ethers.Contract(bikeAddr, abi, signer);
            const tx = await bike.returnBike();
            await tx.wait();
            alert("已還車，押金已退回您的錢包");
            location.reload();
        } catch (e) { alert("還車失敗"); }
    }

    async function handleBuyTokens() {
        const val = document.getElementById('buyAmount').value;
        if (!val) return;
        const signer = new ethers.providers.Web3Provider(window.ethereum).getSigner();
        const token = new ethers.Contract(nkustAddr, abi, signer);
        const tx = await token.buyToken({ value: ethers.utils.parseEther(val) });
        await tx.wait();
        init();
    }

    async function updateWeather(city) {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=db68851cff88bbfaf24ddcefbccb2a18&units=metric&lang=zh_tw`);
            const data = await res.json();
            document.getElementById('cityName').innerText = city === 'Taipei' ? "台北市" : "高雄市";
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°C";
        } catch(e) {}
    }

    async function updatePrice() {
    const priceDisplay = document.getElementById('ethUsdDisplay');
    try {
        // 使用 CoinGecko API 獲取即時 ETH 價格
        const response = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd", {
            method: 'GET',
            headers: { 'Accept': 'application/json' }
        });
        
        if (!response.ok) throw new Error('API 無法連線');
        
        const data = await response.json();
        const price = data.ethereum.usd;
        
        // 更新介面並加上綠色閃爍效果（代表即時更新）
        priceDisplay.innerText = "$ " + price.toLocaleString();
        priceDisplay.style.color = "#10b981"; 
        console.log("匯率更新成功:", price);
        
    } catch(e) {
        console.error("匯率抓取失敗，改用備用數據:", e);
        // 保底機制：萬一學校網路擋 API，至少畫面上要有數字
        priceDisplay.innerText = "$ 2,245.50 (模擬)";
        priceDisplay.style.color = "#64748b";
    }
}

    window.onload = () => { init(); updateWeather('Kaohsiung'); };
</script>

</body>
</html>
