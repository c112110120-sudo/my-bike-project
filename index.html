<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBike | 高科幣校園租賃系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #f4f7f6; color: #334155; font-family: 'Noto Sans TC', sans-serif; }
        .glass { background: #ffffff; border-radius: 16px; border: 1px solid #e2e8f0; padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .page-title { background: linear-gradient(135deg, #0d9488, #0284c7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .price-title { color: #64748b; font-size: 0.85rem; margin-bottom: 5px; font-weight: 500; text-transform: uppercase; }
        .price-val { color: #0ea5e9; font-size: 1.6rem; font-weight: 700; }
        .btn-city.active { background: linear-gradient(135deg, #14b8a6, #0ea5e9); color: white; border: none; }
        .rent-box { border: 2px solid #0ea5e9; background: rgba(14, 165, 233, 0.02); }
        .status-box { border: 1px solid #f59e0b; background: rgba(245,158,11,0.05); display: none; }
        .btn-main { background: linear-gradient(135deg, #10b981, #14b8a6); color: white; border: none; font-weight: 600; border-radius: 50px; padding: 15px; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(16,185,129,0.3); color: white; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="page-title mb-2">🚲 SmartBike Dashboard</h1>
        <div id="walletStatus" class="badge bg-light text-muted border rounded-pill px-3 py-2">錢包未連線</div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="glass text-center">
                <h5 class="price-title mb-3">📍 環境監測</h5>
                <div class="btn-group mb-3 w-100 shadow-sm rounded-pill overflow-hidden">
                    <button class="btn btn-outline-secondary btn-sm btn-city active" id="btn-Taipei" onclick="updateWeather('Taipei')">台北</button>
                    <button class="btn btn-outline-secondary btn-sm btn-city" id="btn-Kaohsiung" onclick="updateWeather('Kaohsiung')">高雄</button>
                </div>
                <h4 id="cityName" class="fw-bold text-dark">Taipei</h4>
                <h2 class="fw-bold my-2" id="temp" style="font-size: 2.5rem;">--°C</h2>
                <p id="weatherDesc" class="text-muted small">同步中...</p>
            </div>

            <div class="glass text-center border-info">
                <h5 class="price-title mb-3">💳 我的校園錢包</h5>
                <div class="price-val" id="nkustBalanceDisplay">0.00 NKUST</div>
                <button class="btn btn-link btn-sm text-decoration-none mt-2" onclick="addNKUSTtoWallet()">+ 加入代幣至錢包</button>
            </div>
        </div>

        <div class="col-md-8">
            <div class="glass rent-box h-100">
                <h4 class="fw-bold mb-4">🚲 校園單車租賃</h4>
                <div class="row mb-4 text-center">
                    <div class="col-6 border-end">
                        <p class="text-muted mb-1">系統定價 (USD)</p>
                        <h3 class="fw-bold">$1.00 <small class="fs-6">/ hr</small></h3>
                    </div>
                    <div class="col-6">
                        <p class="text-info mb-1">即時匯率 (ETH/USD)</p>
                        <h3 class="text-info fw-bold" id="ethUsdDisplay">$ --</h3>
                    </div>
                </div>

                <div id="statusBox" class="glass status-box mb-4">
                    <h6 class="text-warning fw-bold mb-2">📋 鏈上租借紀錄</h6>
                    <div class="row small">
                        <div class="col-6">狀態：<span class="text-success fw-bold">租借中</span></div>
                        <div class="col-6">押金：<span id="statusDeposit" class="fw-bold">0</span> NKUST</div>
                        <div class="col-12 mt-2 border-top pt-2">時間：<span id="statusTime">--</span></div>
                    </div>
                </div>

                <div class="d-grid gap-3">
                    <button id="approveBtn" class="btn btn-outline-info btn-lg rounded-pill fw-bold" onclick="handleApprove()">1. 授權合約使用 NKUST</button>
                    <button id="rentBtn" class="btn btn-main btn-lg shadow" onclick="handleRent()" disabled>2. 支付押金並取車</button>
                    <button id="returnBtn" class="btn btn-outline-warning btn-lg rounded-pill fw-bold" onclick="handleReturn()">歸還單車並結算</button>
                </div>

                <div class="mt-4 pt-3 border-top text-center">
                    <p class="text-muted x-small"><strong>NKUST 合約：</strong><br><code style="font-size: 0.75rem;">0x6b3f588981532574d636b7146449AD8B0741782B</code></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const bikeAddress = "0x901f0B33350B37aF40281d6E715A79441Eb6c005";
    const nkustAddress = "0x6b3f588981532574d636b7146449AD8B0741782B";
    const erc20ABI = ["function balanceOf(address) view returns (uint256)", "function approve(address, uint256) returns (bool)", "function allowance(address, address) view returns (uint256)"];
    const bikeABI = ["function rentBike() public", "function returnBike() public", "function rentals(address) public view returns (uint256, uint256, bool)"];

    async function updateWeather(city) {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=db68851cff88bbfaf24ddcefbccb2a18&units=metric&lang=zh_tw`);
        const data = await res.json();
        document.getElementById('cityName').innerText = data.name;
        document.getElementById('temp').innerText = Math.round(data.main.temp) + "°C";
        document.getElementById('weatherDesc').innerText = data.weather[0].description;
        document.getElementById('btn-Taipei').classList.toggle('active', city === 'Taipei');
        document.getElementById('btn-Kaohsiung').classList.toggle('active', city === 'Kaohsiung');
    }

    async function init() {
        if (!window.ethereum) return;
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const accounts = await provider.listAccounts();
        if (accounts.length > 0) {
            document.getElementById('walletStatus').innerText = "已連線: " + accounts[0].substring(0, 8);
            const token = new ethers.Contract(nkustAddress, erc20ABI, provider);
            const bal = await token.balanceOf(accounts[0]);
            document.getElementById('nkustBalanceDisplay').innerText = parseFloat(ethers.utils.formatUnits(bal, 18)).toFixed(2) + " NKUST";
            
            const allow = await token.allowance(accounts[0], bikeAddress);
            if (allow.gt(0)) {
                document.getElementById('rentBtn').disabled = false;
                document.getElementById('approveBtn').innerText = "✓ 已完成授權";
                document.getElementById('approveBtn').disabled = true;
            }

            const bike = new ethers.Contract(bikeAddress, bikeABI, provider);
            const info = await bike.rentals(accounts[0]);
            if (info[2]) {
                document.getElementById('statusBox').style.display = 'block';
                document.getElementById('statusDeposit').innerText = ethers.utils.formatUnits(info[1], 18);
                document.getElementById('statusTime').innerText = new Date(info[0].toNumber()*1000).toLocaleString();
                document.getElementById('rentBtn').disabled = true;
            }
        }
        const pRes = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd");
        const pData = await pRes.json();
        document.getElementById('ethUsdDisplay').innerText = "$ " + pData.ethereum.usd.toLocaleString();
    }

    async function handleApprove() {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();
        const token = new ethers.Contract(nkustAddress, erc20ABI, signer);
        const tx = await token.approve(bikeAddress, ethers.utils.parseUnits("1000", 18));
        await tx.wait();
        alert("授權成功！");
        init();
    }

    async function handleRent() {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const signer = provider.getSigner();
        const bike = new ethers.Contract(bikeAddress, bikeABI, signer);
        const tx = await bike.rentBike();
        await tx.wait();
        alert("取車成功！");
        init();
    }

    async function handleReturn() {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const signer = provider.getSigner();
        const bike = new ethers.Contract(bikeAddress, bikeABI, signer);
        const tx = await bike.returnBike();
        await tx.wait();
        alert("還車成功！");
        init();
    }

    async function addNKUSTtoWallet() {
        await window.ethereum.request({ method: 'wallet_watchAsset', params: { type: 'ERC20', options: { address: nkustAddress, symbol: 'NKUST', decimals: 18 }}});
    }

    updateWeather('Taipei');
    init();
</script>
</body>
</html>
