<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBike 智慧鎖</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <!-- QR Code 掃描 -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #0a0f1e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #111827;
            border-radius: 24px;
            padding: 32px 24px;
            width: 100%;
            max-width: 380px;
            border: 1px solid #1f2937;
        }

        .title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ===== 鎖狀態大圖示 ===== */
        .lock-display {
            text-align: center;
            padding: 32px 0;
        }
        .lock-icon {
            font-size: 6rem;
            line-height: 1;
            margin-bottom: 16px;
            transition: all 0.5s;
        }
        .lock-status {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .lock-status.locked   { color: #ef4444; }
        .lock-status.unlocked { color: #22c55e; }
        .lock-status.waiting  { color: #f59e0b; }

        .bike-label {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 8px;
            text-align: center;
        }

        /* ===== 連接區 ===== */
        .section { margin-bottom: 20px; }
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Noto Sans TC', sans-serif;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        .btn-connect  { background: linear-gradient(135deg,#0d9488,#0284c7); color: white; }
        .btn-scan     { background: #1d4ed8; color: white; }
        .btn-bind     { background: #16a34a; color: white; }
        .btn-disabled { background: #1f2937; color: #475569; cursor: not-allowed; }
        .btn:hover:not(.btn-disabled) { opacity: 0.9; transform: translateY(-1px); }

        /* ===== 狀態列 ===== */
        .status-bar {
            background: #0f172a;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 0.82rem;
            color: #64748b;
            border: 1px solid #1e293b;
        }
        .status-bar span { color: #38bdf8; font-weight: 600; }

        /* ===== QR Scanner ===== */
        #qr-reader {
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 10px;
            display: none;
        }

        /* ===== 事件紀錄 ===== */
        .log-box {
            background: #0f172a;
            border-radius: 10px;
            padding: 12px;
            max-height: 140px;
            overflow-y: auto;
            font-size: 0.75rem;
            font-family: monospace;
            border: 1px solid #1e293b;
        }
        .log-item { padding: 3px 0; border-bottom: 1px solid #1e293b; color: #94a3b8; }
        .log-item.green  { color: #22c55e; }
        .log-item.red    { color: #ef4444; }
        .log-item.yellow { color: #f59e0b; }

        /* ===== 動畫 ===== */
        @keyframes pulse-green {
            0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
            50%     { box-shadow: 0 0 0 20px rgba(34,197,94,0); }
        }
        @keyframes pulse-red {
            0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            50%     { box-shadow: 0 0 0 20px rgba(239,68,68,0); }
        }
        .pulse-green { animation: pulse-green 1.5s infinite; }
        .pulse-red   { animation: pulse-red 2s infinite; }

        .divider { border: none; border-top: 1px solid #1f2937; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="title">🚲 SmartBike 智慧鎖</div>

    <!-- 鎖狀態顯示 -->
    <div class="lock-display">
        <div class="lock-icon" id="lockIcon">🔒</div>
        <div class="lock-status locked" id="lockStatus">已上鎖</div>
        <div class="bike-label" id="bikeLabel">尚未綁定車輛</div>
    </div>

    <!-- 狀態列 -->
    <div class="status-bar" id="statusBar">
        錢包：<span id="walletShort">未連接</span>
    </div>

    <!-- Step 1：連接錢包 -->
    <div class="section" id="step1">
        <div class="section-title">步驟 1 — 連接錢包</div>
        <button class="btn btn-connect" onclick="connectWallet()">🦊 連接 MetaMask</button>
    </div>

    <!-- Step 2：掃 QR Code 綁定車輛 -->
    <div class="section" id="step2" style="display:none;">
        <div class="section-title">步驟 2 — 掃描車輛 QR Code</div>
        <button class="btn btn-scan" onclick="startQrScan()" id="scanBtn">📷 掃描 QR Code</button>
        <div id="qr-reader"></div>
        <div id="qrResult" style="font-size:0.8rem;color:#94a3b8;text-align:center;display:none;"></div>
        <button class="btn btn-bind" onclick="bindLock()" id="bindBtn" style="display:none;">
            ⛓️ 綁定此車為智慧鎖
        </button>
    </div>

    <!-- Step 3：監聽中 -->
    <div class="section" id="step3" style="display:none;">
        <div class="section-title">步驟 3 — 監聽合約事件</div>
        <div style="font-size:0.82rem;color:#22c55e;text-align:center;padding:8px;background:#052e16;border-radius:8px;">
            ✅ 已綁定，正在監聽租借事件...
        </div>
    </div>

    <hr class="divider">

    <!-- 事件紀錄 -->
    <div class="section-title">事件紀錄</div>
    <div class="log-box" id="logBox">
        <div class="log-item yellow">等待連接...</div>
    </div>
</div>

<script>
// ===== 合約設定 =====
const bikeAddr   = "0xABC4511aA0351497006e717bf09714a6113C5def"; 
const escrowAddr = "0xd08B9358f5Ee2b99aa75cCF9C8cA503561Dc9842"; 

const bikeAbi = [
    "function registerLock(uint8 bikeId)",
    "function getBike(uint8 bikeId) view returns (bool isAvailable, address renter, uint256 rentStartTime, bool lockBound, address lockAddress)",
    "event BikeRented(address indexed user, uint8 indexed bikeId, uint256 depositNkust)",
    "event BikeReturned(address indexed user, uint8 indexed bikeId, uint256 feeNkust)"
];

// ===== 狀態 =====
let provider     = null;
let signer       = null;
let myAddress    = null;
let boundBikeId  = null;
let isLocked     = true;
let qrScanner    = null;
let scannedBikeId = null;
let eventListening = false;

// ===== 工具 =====
function addLog(msg, type = '') {
    const box  = document.getElementById('logBox');
    const item = document.createElement('div');
    item.className = 'log-item ' + type;
    item.innerText = new Date().toLocaleTimeString() + '  ' + msg;
    box.prepend(item);
}

function setLockState(locked) {
    isLocked = locked;
    const icon   = document.getElementById('lockIcon');
    const status = document.getElementById('lockStatus');

    if (locked) {
        icon.innerText     = '🔒';
        icon.className     = 'lock-icon pulse-red';
        status.innerText   = '已上鎖';
        status.className   = 'lock-status locked';
    } else {
        icon.innerText     = '🔓';
        icon.className     = 'lock-icon pulse-green';
        status.innerText   = '已開鎖';
        status.className   = 'lock-status unlocked';
    }
}

// ===== Step 1：連接錢包 =====
async function connectWallet() {
    if (!window.ethereum) {
        alert("請用 MetaMask App 內建瀏覽器開啟");
        return;
    }
    try {
        provider  = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer    = provider.getSigner();
        myAddress = await signer.getAddress();

        const short = myAddress.substring(0,6) + "..." + myAddress.substring(myAddress.length-4);
        document.getElementById('walletShort').innerText = short;
        document.getElementById('step1').style.display  = 'none';
        document.getElementById('step2').style.display  = 'block';

        addLog("錢包已連接：" + short, "green");

        // 檢查此錢包是否已綁定某台車
        await checkExistingBind();

    } catch(e) { alert("連接失敗：" + e.message); }
}

// 檢查是否已綁定車輛
async function checkExistingBind() {
    try {
        const bike = new ethers.Contract(bikeAddr, bikeAbi, provider);
        // 掃描全部 10 台車
        for (let i = 0; i < 10; i++) {
            const info = await bike.getBike(i);
            if (info.lockBound && info.lockAddress.toLowerCase() === myAddress.toLowerCase()) {
                boundBikeId = i;
                document.getElementById('bikeLabel').innerText = `已綁定：SB-${String(i+1).padStart(3,'0')}`;
                document.getElementById('step2').style.display = 'none';
                document.getElementById('step3').style.display = 'block';
                addLog(`偵測到已綁定車輛 SB-${String(i+1).padStart(3,'0')}`, "yellow");
                startListening();
                return;
            }
        }
    } catch(e) { console.error("檢查綁定失敗:", e); }
}

// ===== Step 2：QR Code 掃描 =====
function startQrScan() {
    const readerEl = document.getElementById('qr-reader');
    readerEl.style.display = 'block';
    document.getElementById('scanBtn').style.display = 'none';

    qrScanner = new Html5Qrcode("qr-reader");
    qrScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
            // QR Code 格式：smartbike://bike/0  (車號)
            qrScanner.stop();
            readerEl.style.display = 'none';
            parseQrCode(decodedText);
        },
        (err) => {}
    ).catch(e => alert("相機啟動失敗：" + e));
}

function parseQrCode(text) {
    // 支援三種格式：
    // 1. https://...lock.html?bike=0  （新格式，掃碼直接開頁面）
    // 2. smartbike://bike/0
    // 3. 直接是數字（例如：0）
    let bikeId = null;

    try {
        const url   = new URL(text);
        const param = url.searchParams.get('bike');
        if (param !== null) bikeId = parseInt(param);
    } catch(e) {}

    if (bikeId === null) {
        const match = text.match(/smartbike:\/\/bike\/(\d+)/);
        if (match) bikeId = parseInt(match[1]);
    }
    if (bikeId === null && /^\d+$/.test(text.trim())) {
        bikeId = parseInt(text.trim());
    }

    if (bikeId === null || bikeId < 0 || bikeId > 9) {
        addLog("無效的 QR Code：" + text, "red");
        document.getElementById('scanBtn').style.display = 'block';
        return;
    }

    scannedBikeId = bikeId;
    const label   = `SB-${String(bikeId+1).padStart(3,'0')}`;

    document.getElementById('qrResult').style.display  = 'block';
    document.getElementById('qrResult').innerText      = `✅ 掃描成功：${label}`;
    document.getElementById('bindBtn').style.display   = 'block';
    document.getElementById('bikeLabel').innerText     = `準備綁定：${label}`;

    addLog("掃描成功：" + label, "green");
}

// ===== 綁定車輛 =====
async function bindLock() {
    if (scannedBikeId === null) return;
    try {
        const bike = new ethers.Contract(bikeAddr, bikeAbi, signer);

        // 先確認這台車還沒有被綁定
        const info = await bike.getBike(scannedBikeId);
        if (info.lockBound) {
            addLog("此車已被其他鎖綁定，請聯絡管理員", "red");
            alert("此車已被綁定，請聯絡管理員解除後再試。");
            return;
        }

        const tx = await bike.registerLock(scannedBikeId);
        addLog("綁定交易送出，等待確認...", "yellow");
        await tx.wait();

        boundBikeId = scannedBikeId;
        const label = `SB-${String(scannedBikeId+1).padStart(3,'0')}`;

        document.getElementById('bikeLabel').innerText     = `已綁定：${label}`;
        document.getElementById('step2').style.display     = 'none';
        document.getElementById('step3').style.display     = 'block';
        document.getElementById('bindBtn').style.display   = 'none';
        document.getElementById('qrResult').style.display  = 'none';

        addLog(`✅ 綁定成功：${label}`, "green");
        startListening();

    } catch(e) { addLog("綁定失敗：" + (e.reason || e.message), "red"); }
}

// ===== 監聽合約事件 =====
function startListening() {
    if (eventListening || boundBikeId === null) return;
    eventListening = true;

    const bike = new ethers.Contract(bikeAddr, bikeAbi, provider);

    // 監聽租車事件 → 開鎖
    bike.on("BikeRented", (user, bikeId, deposit, event) => {
        if (bikeId !== boundBikeId) return;
        addLog(`租車事件：${user.substring(0,8)}... 租了此車`, "yellow");
        setLockState(false); // 開鎖
        addLog("🔓 智慧鎖已開啟", "green");

        // 震動提示（手機支援）
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    });

    // 監聽還車事件 → 上鎖
    bike.on("BikeReturned", (user, bikeId, fee, event) => {
        if (bikeId !== boundBikeId) return;
        const feeDisplay = Math.ceil(parseFloat(ethers.utils.formatUnits(fee, 18)));
        addLog(`還車事件：${user.substring(0,8)}... 還車，費用 ${feeDisplay} NKUST`, "yellow");
        setLockState(true); // 上鎖
        addLog("🔒 智慧鎖已上鎖", "red");

        if (navigator.vibrate) navigator.vibrate([500]);
    });

    addLog(`開始監聽 SB-${String(boundBikeId+1).padStart(3,'0')} 的事件...`, "green");
}

// ===== 自動讀取網址參數 bike=N =====
(function autoLoadFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const bikeParam = params.get('bike');
    if (bikeParam === null) return;

    const bikeId = parseInt(bikeParam);
    if (isNaN(bikeId) || bikeId < 0 || bikeId > 9) return;

    scannedBikeId = bikeId;
    const label   = `SB-${String(bikeId+1).padStart(3,'0')}`;

    // 自動跳過掃描步驟，直接進入綁定步驟
    document.getElementById('bikeLabel').innerText     = `準備綁定：${label}`;
    document.getElementById('qrResult').style.display  = 'block';
    document.getElementById('qrResult').innerText      = `✅ 已自動識別：${label}`;
    document.getElementById('bindBtn').style.display   = 'block';
    document.getElementById('scanBtn').style.display   = 'none';

    addLog(`從 QR Code 識別車輛：${label}`, "green");
})();

// ===== MetaMask 監聽 =====
if (window.ethereum) {
    window.ethereum.on('accountsChanged', () => location.reload());
    window.ethereum.on('chainChanged',    () => location.reload());
}
</script>
</body>
</html>
